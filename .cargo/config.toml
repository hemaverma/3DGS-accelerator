# Cargo configuration for cross-compilation
#
# This file configures Rust cross-compilation for aarch64-unknown-linux-gnu
# (ARM64 Linux) target when building Docker images.

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

# Build settings
[build]
# Parallel compilation jobs (adjust based on available CPU cores)
jobs = 4

[profile.release]
# Optimize for size in release builds
opt-level = "z"
lto = true
codegen-units = 1
strip = true
