# 3DGS Video Processor - YAML Configuration
# This file contains ONLY 3DGS training hyperparameters
# All deployment settings (paths, timeouts, etc.) are controlled via environment variables
# See docs/3dgs-video-processor-prd.md for complete environment variable reference

# Backend selection: auto | gaussian-splatting | gsplat | 3dgs-cpp | mock
# Determines which 3D Gaussian Splatting implementation to use for training
#
# auto (recommended): Automatically selects based on GPU availability:
#   - CUDA GPU detected → gsplat (fastest, GPU-optimized)
#   - Metal GPU (Apple Silicon) → gaussian-splatting
#   - ROCm GPU (AMD) → gaussian-splatting
#   - No GPU → mock (testing only, no real training)
#
# Or explicitly specify a backend:
#   gaussian-splatting: Reference implementation (supports CPU/GPU)
#   gsplat: Python/CUDA optimized (requires NVIDIA GPU)
#   3dgs-cpp: C++ implementation (experimental)
#   mock: Fast mock for testing (no real training)
#
# Can be overridden with BACKEND environment variable
# Use FORCE_CPU_BACKEND=1 to force mock backend regardless of GPU
# Use COLMAP_USE_CPU=1 to force COLMAP to CPU-only mode (headless-safe, no OpenGL needed)
backend: auto

# Frame extraction settings
# Note: Can be overridden by FRAME_RATE/FRAME_COUNT environment variables
frame_extraction:
  rate: 1                    # Frames per second to extract (if count not set)
  count: null                # Total frames per video (overrides rate if set)

# COLMAP Structure-from-Motion settings
# These control how camera poses and scene structure are computed
colmap:
  matcher: exhaustive        # Feature matching strategy: exhaustive | sequential | vocab_tree
                            # exhaustive: Best quality, slowest (all image pairs)
                            # sequential: Faster, assumes temporal ordering
                            # vocab_tree: Fastest, requires vocabulary file
  camera_model: OPENCV       # Camera model: SIMPLE_PINHOLE | OPENCV | FULL_OPENCV
                            # OPENCV recommended for most camera types (handles distortion)

# 3DGS Training parameters
# These control the quality vs speed tradeoff during training
training:
  iterations: 30000          # Total training iterations (higher = better quality, slower)
  learning_rate: 0.0025      # Learning rate for optimization
  densification_interval: 100    # Steps between densification checks
  densification_start: 500       # Iteration to start densifying Gaussians
  densification_stop: 15000      # Iteration to stop densification
  opacity_reset_interval: 3000   # Steps between opacity resets (helps remove floaters)

# Export settings
# Determines output file formats and precision
export:
  formats:
    - ply                    # Standard 3D point cloud format
    - splat                  # Web-optimized format for real-time rendering
  ply_precision: float32     # Numeric precision: float32 | float16
                            # float32: Higher precision, larger files
                            # float16: Smaller files, minimal quality loss
